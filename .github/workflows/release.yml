name: Release hcpro CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-14
            artifact: hcpro-darwin-arm64
          - target: bun-darwin-x64
            os: macos-13
            artifact: hcpro-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-22.04
            artifact: hcpro-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-22.04-arm
            artifact: hcpro-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: npm ci && cd cli && bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          cd cli && bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile ../dist/${{ matrix.artifact }}

      - name: Package tarball
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          if [ "$RUNNER_OS" = "macOS" ]; then
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          else
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
